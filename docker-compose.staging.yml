services:
  web:
    build:
      context: .
      dockerfile: ./.docker/staging/nginx/Dockerfile
    volumes:
      - ../files/laravel-storage-staging:/var/www/storage
      - ../certs/whatsappqr-test.deudu.co:/etc/ssl/certs/whatsappqr-test.deudu.co
    networks:
      - dokploy-network
    depends_on:
      php-fpm:
        condition: service_healthy # Wait for php-fpm to start
    labels:
      - traefik.enable=true

      # Router HTTP (redirige)
      - traefik.http.routers.whatsappqr-test-http.rule=Host(`whatsappqr-test.deudu.co`)
      - traefik.http.routers.whatsappqr-test-http.entrypoints=web
      - traefik.http.routers.whatsappqr-test-http.middlewares=redirect-https
      - traefik.http.routers.whatsappqr-test-http.service=whatsappqr-test

      # Middleware redirect
      - traefik.http.middlewares.redirect-https.redirectscheme.scheme=https

      # Router HTTPS (APP)
      - traefik.http.routers.whatsappqr-test-https.rule=Host(`whatsappqr-test.deudu.co`)
      - traefik.http.routers.whatsappqr-test-https.entrypoints=websecure
      - traefik.http.routers.whatsappqr-test-https.tls=true
      - traefik.http.routers.whatsappqr-test-https.service=whatsappqr-test

      # Service HTTP
      - traefik.http.services.whatsappqr-test.loadbalancer.server.port=80

      # =========================
      # WEBSOCKETS
      # =========================
      - traefik.http.routers.whatsappqr-test-ws.rule=Host(`whatsappqr-test.deudu.co`) && PathPrefix(`/ws`)
      - traefik.http.routers.whatsappqr-test-ws.entrypoints=websecure
      - traefik.http.routers.whatsappqr-test-ws.tls=true
      - traefik.http.routers.whatsappqr-test-ws.service=whatsappqr-test-ws

      - traefik.http.services.whatsappqr-test-ws.loadbalancer.server.port=8080
  php-fpm:
    # For the php-fpm service, we will use our common PHP-FPM Dockerfile with the development target
    build:
      context: .
      dockerfile: ./.docker/common/php-fpm/Dockerfile
      target: production # Use the 'production' stage in the Dockerfile
    restart: unless-stopped
    volumes:
      - ../files/laravel-storage-staging:/var/www/storage
    env_file:
      # Load the environment variables from the Laravel application
      - .env
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dokploy-network
  
  # The 'php-cli' service provides a command-line interface for running Artisan commands and other CLI tasks.
  # -----------------------------------------------------------
  # This is useful for running migrations, seeders, or any custom scripts.
  # It shares the same codebase and environment as the 'php-fpm' service.
  # -----------------------------------------------------------
  php-cli:
    build:
      context: .
      dockerfile: ./.docker/php-cli/Dockerfile
    tty: true # Enables an interactive terminal
    stdin_open: true # Keeps standard input open for 'docker exec'
    env_file:
      - .env
    networks:
      - dokploy-network

  worker:
    build:
      context: .
      dockerfile: ./.docker/common/php-fpm/Dockerfile
      target: production
    volumes:
      # Mount the same storage volume as php-fpm so the worker can access files
      - ../files/laravel-storage-staging:/var/www/storage
    env_file:
      - .env
    networks:
      - dokploy-network
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/worker-entrypoint.sh"]
    command: ["php", "artisan", "queue:work", "database", "--sleep=3", "--tries=3"]

  # The 'websocket' service runs Laravel Reverb for real-time WebSocket connections.
  # -----------------------------------------------------------
  # This service handles broadcasting events to the frontend via WebSockets.
  # It shares the same codebase and environment as the 'php-fpm' service.
  # The port can be configured via REVERB_PORT (default: 8080).
  # -----------------------------------------------------------
  websocket:
    build:
      context: .
      dockerfile: ./.docker/common/php-fpm/Dockerfile
      target: production
    volumes:
      # Mount the same storage volume as php-fpm for consistency
      - ../files/laravel-storage-staging:/var/www/storage
    env_file:
      - .env
    networks:
      - dokploy-network
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    depends_on:
      php-fpm:
        condition: service_healthy

networks:
  dokploy-network:
    external: true
